<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>하루하루 발전하쟈!</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  padding: 50px 25px;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: #ececf1;
  color: #111111;
}

.container {
  max-width: 720px;
  margin: 0 auto;
}

h1 {
  font-size: 30px;
  font-weight: 700;
  margin-bottom: 35px;
}

.input-area {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 30px;
}

input,
select {
  padding: 14px;
  border: none;
  background: white;
  font-size: 15px;
  color: #111111;
}

input:focus,
select:focus {
  outline: none;
}

button {
  border: none;
  background: #111111;
  color: white;
  padding: 14px 18px;
  cursor: pointer;
}

.card {
  background: white;
  padding: 20px;
  margin-bottom: 12px;
  border-left: 4px solid #111111;
}

.title {
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 5px;
}

.card div:nth-child(2) {
  color: #666666;
  font-size: 14px;
}

.result {
  margin-top: 12px;
  font-size: 18px;
  font-weight: 600;
}

.delete-btn {
  margin-top: 12px;
  background: transparent;
  color: #888888;
  padding: 0;
}

.delete-btn:hover {
  color: #d32f2f;
}
</style>
</head>

<body>

<div class="container">
  <h1>하루하루 발전하쟈! 🚀</h1>

  <div class="input-area">
    <input type="text" id="title" placeholder="일정 이름">
    <input type="date" id="date">
    <select id="type">
      <option value="count">경과일</option>
      <option value="dday">D-Day</option>
    </select>
    <button id="addBtn">추가</button>
  </div>

  <div id="eventList"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getFirestore,
  collection,
  addDoc,
  deleteDoc,
  doc,
  onSnapshot,
  query
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBFeUdUDHRwLLG_DINoHu76uTFHQMkM084",
  authDomain: "my-dday.firebaseapp.com",
  projectId: "my-dday",
  storageBucket: "my-dday.firebasestorage.app",
  messagingSenderId: "478938127610",
  appId: "1:478938127610:web:935a77b627b5f83b6ebd43",
  measurementId: "G-PB095THBLF"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const eventsRef = collection(db, "events");

document.getElementById("addBtn").addEventListener("click", async () => {

  const title = document.getElementById("title").value.trim();
  const date = document.getElementById("date").value;
  const type = document.getElementById("type").value;

  if (!title || !date) {
    alert("이름과 날짜를 입력하세요!");
    return;
  }

  await addDoc(eventsRef, {
    title,
    date,
    type
  });

  document.getElementById("title").value = "";
  document.getElementById("date").value = "";
});

function renderEvents(events) {

  const list = document.getElementById("eventList");
  list.innerHTML = "";

  const today = new Date();
  today.setHours(0,0,0,0);

  events.forEach(event => {

    const targetDate = new Date(event.date);
    targetDate.setHours(0,0,0,0);

    let text = "";

    if(event.type === "dday") {

      const diff =
        Math.ceil(
          (targetDate - today) /
          (1000 * 60 * 60 * 24)
        );

      if(diff > 0) {
        text = `D-${diff}`;
      } else if(diff === 0) {
        text = "D-Day 🎉";
      } else {
        text = `D+${Math.abs(diff)}`;
      }

    } else {

      const passed =
        Math.floor(
          (today - targetDate) /
          (1000 * 60 * 60 * 24)
        ) + 1;

      text =
        passed < 1
          ? "아직 시작 전"
          : `${passed}일째`;
    }

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <div class="title">${event.title}</div>
      <div>${event.date}</div>
      <div class="result">${text}</div>
      <button class="delete-btn">
        삭제
      </button>
    `;

    card
      .querySelector(".delete-btn")
      .addEventListener("click", async () => {

        await deleteDoc(
          doc(db, "events", event.id)
        );

      });

    list.appendChild(card);

  });
}

onSnapshot(query(eventsRef), snapshot => {

  const events = [];

  snapshot.forEach(docSnap => {

    events.push({
      id: docSnap.id,
      ...docSnap.data()
    });

  });

  renderEvents(events);

});

</script>

</body>
</html>
